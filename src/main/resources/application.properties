server.port=8080
spring.application.name=cinesync-backend

# CORS: en prod se sobreescribe con la URL de Netlify via variable de entorno
cinesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Async / SSE: sin timeout para mantener conexiones SSE abiertas
spring.mvc.async.request-timeout=-1

# ── Logging ───────────────────────────────────────────────────────────────────
# Silencia el "Broken pipe" de Tomcat/SSE — es comportamiento esperado cuando
# un cliente SSE se desconecta abruptamente. No indica un fallo del sistema:
# el SseEmitterService ya captura la IOException y limpia el emitter muerto.
logging.level.org.apache.catalina.connector.CoyoteAdapter=ERROR
logging.level.org.apache.catalina.core.ContainerBase=ERROR
logging.level.org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter=ERROR
logging.level.org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitterReturnValueHandler=ERROR
 