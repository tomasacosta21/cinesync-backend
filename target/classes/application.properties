server.port=8080
spring.application.name=cinesync-backend

# CORS: en prod se sobreescribe con la URL de Netlify via variable de entorno
cinesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Async / SSE: sin timeout para mantener conexiones SSE abiertas
spring.mvc.async.request-timeout=-1
